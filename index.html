<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kasra Gordini</title>
  <meta name="description" content="Kasra Gordini — AI, Analytics & Systems" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Outfit', sans-serif;
      --transition-theme: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }

    /* Dark mode (default) */
    [data-theme="dark"] {
      --ink: #07080f;
      --ink2: #0f1018;
      --smoke: #161820;
      --text: #ede8e0;
      --text-dim: rgba(237,232,224,0.5);
      --text-dimmer: rgba(237,232,224,0.28);
      --navy: #2d5aa0;
      --navy-light: #4a7fd4;
      --navy-glow: rgba(45,90,160,0.2);
      --gold: #c8a96e;
      --border-subtle: var(--border-subtle);
      --nav-bg: rgba(7,8,15,0.85);
      --scroll-bar-bg: var(--border-subtle);
      --hero-overlay1: linear-gradient(105deg, rgba(7,8,15,0.97) 0%, rgba(7,8,15,0.82) 38%, rgba(7,8,15,0.3) 60%, transparent 75%);
      --hero-overlay2: linear-gradient(to top, rgba(7,8,15,1) 0%, rgba(7,8,15,0.6) 18%, transparent 40%);
    }

    /* Light mode */
    [data-theme="light"] {
      --ink: #f0ece4;
      --ink2: #e8e2d8;
      --smoke: #ddd7cb;
      --text: #0f1520;
      --text-dim: rgba(15,21,32,0.55);
      --text-dimmer: rgba(15,21,32,0.32);
      --navy: #1a3a6e;
      --navy-light: #1a3a6e;
      --navy-glow: rgba(26,58,110,0.12);
      --gold: #9a7040;
      --border-subtle: rgba(15,21,32,0.1);
      --nav-bg: rgba(240,236,228,0.88);
      --scroll-bar-bg: rgba(15,21,32,0.08);
      --hero-overlay1: linear-gradient(105deg, rgba(240,236,228,0.96) 0%, rgba(240,236,228,0.80) 38%, rgba(240,236,228,0.25) 60%, transparent 75%);
      --hero-overlay2: linear-gradient(to top, rgba(240,236,228,0.98) 0%, rgba(240,236,228,0.55) 18%, transparent 40%);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--ink);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none;
      transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
      transition: var(--transition-theme);
    }

    /* Custom cursor */
    #cursor {
      position: fixed; width: 10px; height: 10px; border-radius: 50%;
      background: var(--navy-light); pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%); transition: transform 0.1s, width 0.2s, height 0.2s, opacity 0.2s;
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed; width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(45,90,160,0.5); pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%); transition: all 0.18s ease;
    }

    /* Scrollbar */


    /* ── THEME TOGGLE ────────────────────────────────── */
    .theme-toggle {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid rgba(46,95,171,0.35);
      background: transparent;
      color: var(--text-dim); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s; flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--navy-light); color: var(--navy-light); background: var(--navy-glow); }
    [data-theme="light"] .theme-toggle { border-color: rgba(26,58,110,0.3); }

    /* ── THEME VARIABLES ─────────────────────────────── */
    :root {
      --bg-dark: #0a0a0f;
      --bg-dark2: #12121a;
      --smoke-dark: #1c1c28;
      --text-dark: #ede8e0;
      --text-dim-dark: rgba(237,232,224,0.5);
      --text-dimmer-dark: rgba(237,232,224,0.28);

      --bg-light: #f0f2f7;
      --bg-light2: #e4e8f0;
      --smoke-light: #d8dde8;
      --text-light: #0f1f3d;
      --text-dim-light: rgba(15,31,61,0.6);
      --text-dimmer-light: rgba(15,31,61,0.35);
    }
    [data-theme="dark"] {
      --ink: #0a0a0f; --ink2: #12121a; --smoke: #1c1c28;
      --text: #ede8e0;
      --text-dim: rgba(237,232,224,0.5);
      --text-dimmer: rgba(237,232,224,0.28);
      --navy-accent: #1a3a6e;
      --navy-light: #2e5fab;
      --navy-glow: rgba(26,58,110,0.22);
      --hero-overlay-l: rgba(10,10,15,0.96);
      --hero-overlay-m: rgba(10,10,15,0.82);
      --hero-overlay-r: rgba(10,10,15,0.28);
      --hero-bottom: rgba(10,10,15,1);
      --hero-bottom-mid: rgba(10,10,15,0.55);
      --card-bg: rgba(255,255,255,0.03);
      --scrollbar-track: #0a0a0f;
    }
    [data-theme="light"] {
      --ink: #f0f2f7; --ink2: #e4e8f0; --smoke: #d8dde8;
      --text: #0f1f3d;
      --text-dim: rgba(15,31,61,0.6);
      --text-dimmer: rgba(15,31,61,0.38);
      --navy-accent: #1a3a6e;
      --navy-light: #1e4db7;
      --navy-glow: rgba(26,58,110,0.12);
      --hero-overlay-l: rgba(10,15,30,0.75);
      --hero-overlay-m: rgba(10,15,30,0.5);
      --hero-overlay-r: rgba(10,15,30,0.1);
      --hero-bottom: rgba(240,242,247,1);
      --hero-bottom-mid: rgba(240,242,247,0.5);
      --card-bg: rgba(255,255,255,0.6);
      --scrollbar-track: #e4e8f0;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--navy); border-radius: 2px; }

    /* Progress */
    #progress {
      position: fixed; top: 0; left: 0; height: 2px; width: 0;
      background: linear-gradient(90deg, var(--navy), var(--navy-light));
      z-index: 1000; transition: width 0.05s linear;
    }

    a { color: inherit; text-decoration: none; cursor: none; }
    button { cursor: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      padding: 28px 52px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.4s ease;
    }
    nav.scrolled {
      padding: 16px 52px;
      background: var(--nav-bg, rgba(10,10,15,0.85));
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(26,58,110,0.12);
    }
    .nav-brand {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .nav-brand b { font-weight: 600; color: var(--navy-light); }
    .nav-links {
      display: flex; gap: 36px; list-style: none;
    }
    .nav-links a {
      font-size: 0.78rem; font-weight: 300; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px; background: var(--navy-light);
      transition: width 0.25s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--navy-light); }
    .nav-links a.active::after { width: 100%; }

    .theme-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--border-subtle); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: none; color: var(--text-dim); font-size: 1rem;
      transition: all 0.25s; flex-shrink: 0;
    }
    .theme-btn:hover { color: var(--navy-light); border-color: var(--navy-light); }
    .nav-right-wrap { display: flex; align-items: center; gap: 10px; }

    /* HERO */
    #home {
      position: relative; height: 100vh; min-height: 700px;
      overflow: hidden; display: flex; align-items: flex-end;
    }
    .hero-photo {
      position: absolute; inset: 0;
      background-size: cover; background-attachment: scroll;
      background-position: 72% center;
      background-repeat: no-repeat;
    }
    /* Multi-layer overlay for cinematic effect */
    .hero-overlay-left {
      position: absolute; inset: 0;
      background: linear-gradient(105deg,
        var(--hero-overlay-l) 0%,
        var(--hero-overlay-m) 38%,
        var(--hero-overlay-r) 60%,
        transparent 75%
      );
    }
    .hero-overlay-bottom {
      position: absolute; inset: 0;
      background: linear-gradient(to top,
        var(--hero-bottom) 0%,
        var(--hero-bottom-mid) 18%,
        transparent 40%
      );
    }
    .hero-overlay-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.5) 100%);
    }
    /* Purple color grade on photo */
    .hero-photo-grade {
      position: absolute; inset: 0;
      background: rgba(10,20,60,0.15);
      mix-blend-mode: multiply;
    }

    .hero-content {
      position: relative; z-index: 10;
      padding: 0 52px 80px;
      max-width: 760px;
    }
    .hero-kicker {
      font-family: var(--sans);
      font-size: 0.72rem; font-weight: 300; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--navy-light);
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: riseUp 0.8s 0.2s forwards;
    }
    .hero-kicker::before { content: ''; display: block; width: 32px; height: 1px; background: var(--navy-light); }
    .hero-name {
      font-family: var(--serif);
      font-size: clamp(4.5rem, 9vw, 8.5rem);
      font-weight: 300; line-height: 0.9;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      opacity: 0; animation: riseUp 0.9s 0.35s forwards;
    }
    .hero-name em { font-style: italic; color: var(--navy-light); display: block; }
    .hero-tagline {
      font-family: var(--serif);
      font-size: clamp(1.2rem, 2.2vw, 1.7rem);
      font-weight: 300; font-style: italic;
      color: var(--text-dim); margin-bottom: 36px;
      opacity: 0; animation: riseUp 0.9s 0.5s forwards;
    }
    .hero-divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, var(--navy), transparent);
      margin-bottom: 28px;
      opacity: 0; animation: riseUp 0.8s 0.6s forwards;
    }
    .hero-desc {
      font-size: 0.96rem; font-weight: 300; color: var(--text-dim);
      max-width: 480px; line-height: 1.85; margin-bottom: 44px;
      opacity: 0; animation: riseUp 0.9s 0.7s forwards;
    }
    .hero-actions {
      display: flex; gap: 14px; flex-wrap: wrap;
      opacity: 0; animation: riseUp 0.9s 0.85s forwards;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 30px; border-radius: 2px;
      font-family: var(--sans); font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: all 0.25s;
    }
    .btn-primary {
      background: var(--navy); color: #fff;
      border: 1px solid var(--navy);
    }
    .btn-primary:hover { background: var(--navy-light); border-color: var(--navy-light); transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26,58,110,0.35); }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid rgba(237,232,224,0.2);
    }
    .btn-outline:hover { border-color: var(--text); transform: translateY(-2px); }

    .hero-scroll-indicator {
      position: absolute; bottom: 36px; right: 52px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0; animation: fadeIn 1s 1.4s forwards;
    }
    .scroll-text {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dimmer); writing-mode: vertical-rl;
    }
    .scroll-line {
      width: 1px; height: 56px;
      background: linear-gradient(to bottom, var(--navy-light), transparent);
      animation: scrollPulse 2.2s ease-in-out infinite;
    }

    /* SECTION COMMON */
    section { position: relative; z-index: 2; }
    .section-inner { max-width: 1180px; margin: 0 auto; padding: 120px 52px; }
    .s-label {
      font-size: 0.7rem; font-weight: 300; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--navy-light);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .s-label::before { content: ''; display: block; width: 22px; height: 1px; background: var(--navy); }
    .s-heading {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 5vw, 4.8rem);
      font-weight: 300; line-height: 1.05;
      margin-bottom: 24px;
    }
    .s-heading em { font-style: italic; color: var(--navy-light); }
    .s-body {
      font-size: 1rem; font-weight: 300; color: var(--text-dim);
      line-height: 1.85; max-width: 560px;
    }

    /* ABOUT */
    #about { background: var(--ink2); transition: var(--transition-theme); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
      align-items: start; margin-top: 20px;
    }
    .about-block {
      border-top: 1px solid var(--border-subtle);
      padding-top: 16px; margin-bottom: 10px;
    }
    .about-block-num {
      font-family: var(--serif); font-size: 0.85rem; font-style: italic;
      color: var(--navy); margin-bottom: 12px;
    }
    .about-block h3 {
      font-family: var(--serif); font-size: 1.35rem; font-weight: 400;
      margin-bottom: 12px;
    }
    .about-block p {
      font-size: 0.94rem; font-weight: 300; color: var(--text-dim);
      line-height: 1.8;
    }
    .about-right-visual {
      position: relative;
      background: var(--smoke);
      border: 1px solid rgba(26,58,110,0.15);
      border-radius: 8px;
      padding: 20px;
      overflow: hidden;
    }
    .about-right-visual::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--navy), var(--navy-light), transparent);
    }
    .skill-list { list-style: none; }
    .skill-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--border-subtle);
      font-size: 0.9rem; font-weight: 300;
    }
    .skill-item:last-child { border-bottom: none; }
    .skill-bar-wrap { width: 120px; height: 2px; background: var(--border-subtle); border-radius: 2px; overflow: hidden; }
    .skill-bar { height: 100%; background: linear-gradient(90deg, var(--navy), var(--navy-light)); border-radius: 2px; transition: width 1.2s ease; }

    /* WORK */
    #work { background: var(--ink); transition: var(--transition-theme); }
    .work-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; margin-top: 20px; background: var(--border-subtle); border: 1px solid var(--border-subtle); }
    .work-item {
      background: var(--ink); padding: 44px 40px;
      transition: background 0.3s;
      position: relative; overflow: hidden;
    }
    .work-item::after {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 0;
      background: linear-gradient(135deg, rgba(26,58,110,0.06), transparent);
      transition: width 0.4s ease;
    }
    .work-item:hover { background: var(--smoke); }
    .work-item:hover::after { width: 100%; }
    .work-num {
      font-family: var(--serif); font-size: 4rem; font-weight: 300;
      font-style: italic; color: var(--navy); opacity: 0.15;
      line-height: 1; margin-bottom: 10px;
    }
    .work-item h3 { font-family: var(--serif); font-size: 1.5rem; font-weight: 400; margin-bottom: 14px; }
    .work-item p { font-size: 0.92rem; font-weight: 300; color: var(--text-dim); line-height: 1.8; }
    .work-item-tag {
      display: inline-block; margin-top: 20px;
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--navy-light); padding: 5px 10px;
      border: 1px solid rgba(26,58,110,0.3); border-radius: 1px;
    }

    /* PROJECTS */
    #projects { background: var(--ink2); transition: var(--transition-theme); }
    .project-table { margin-top: 64px; }
    .project-row {
      display: grid; grid-template-columns: 80px 1fr 180px 40px;
      align-items: center; gap: 32px; padding: 28px 0;
      border-bottom: 1px solid var(--border-subtle);
      transition: all 0.25s;
      position: relative;
    }
    .project-row::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 0; background: var(--navy-glow);
      transition: width 0.3s;
    }
    .project-row:hover::before { width: 3px; }
    .project-row:hover { padding-left: 20px; }
    .proj-num { font-family: var(--serif); font-style: italic; font-size: 1.1rem; color: var(--navy); opacity: 0.7; }
    .proj-info h3 { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 6px; }
    .proj-info p { font-size: 0.88rem; font-weight: 300; color: var(--text-dim); }
    .proj-category {
      font-size: 0.7rem; letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--navy-light); font-weight: 300; text-align: right;
    }
    .proj-arrow {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(237,232,224,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; transition: all 0.25s;
      color: var(--text-dimmer);
    }
    .project-row:hover .proj-arrow { border-color: var(--navy); color: var(--navy-light); transform: rotate(45deg); }

    /* CONTACT */
    #contact { background: var(--ink); min-height: 100vh; display: flex; align-items: center; transition: var(--transition-theme); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center; }
    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link {
      display: flex; align-items: center; gap: 20px;
      padding: 22px 28px;
      background: var(--smoke); border: 1px solid var(--border-subtle);
      border-radius: 2px; transition: all 0.25s;
    }
    .contact-link:hover { background: var(--ink2); border-color: rgba(26,58,110,0.3); transform: translateX(6px); }
    .contact-icon {
      width: 42px; height: 42px;
      border-radius: 50%; border: 1px solid rgba(26,58,110,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--navy-light); flex-shrink: 0;
    }
    .contact-info strong { display: block; font-size: 0.92rem; font-weight: 400; margin-bottom: 2px; }
    .contact-info span { font-size: 0.82rem; font-weight: 300; color: var(--text-dim); }
    .contact-arrow { margin-left: auto; color: var(--text-dimmer); font-size: 0.75rem; transition: all 0.25s; }
    .contact-link:hover .contact-arrow { color: var(--navy-light); transform: translateX(4px); }

    /* FOOTER */
    footer {
      position: relative; z-index: 2;
      border-top: 1px solid var(--border-subtle);
      padding: 28px 52px; text-align: center;
      font-size: 0.8rem; font-weight: 300; color: var(--text-dimmer);
      letter-spacing: 0.06em; background: var(--ink);
    }
    footer span { color: var(--navy); }

    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.75s ease, transform 0.75s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    /* ANIMATIONS */
    @keyframes riseUp { from { opacity:0; transform: translateY(32px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes scrollPulse { 0%,100% { opacity:0.3; transform:scaleY(1); } 50% { opacity:1; transform:scaleY(0.7); } }

    /* RESPONSIVE */
    @media(max-width:900px){
      nav { padding: 22px 24px; }
      nav.scrolled { padding: 14px 24px; }
      .nav-links { display:none; }
      .hero-content { padding: 0 24px 72px; }
      .hero-scroll-indicator { right:24px; }
      .section-inner { padding: 80px 24px; }
      .about-grid { grid-template-columns:1fr; }
      .work-grid { grid-template-columns:1fr; }
      .contact-grid { grid-template-columns:1fr; gap:48px; }
      .project-row { grid-template-columns:60px 1fr; }
      .proj-category, .proj-arrow { display:none; }
    }
  </style>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Cursor
    function useCursor() {
      useEffect(() => {
        const cur = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        let rx = 0, ry = 0;
        const move = e => {
          cur.style.left = e.clientX + 'px';
          cur.style.top = e.clientY + 'px';
          setTimeout(() => { ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px'; }, 60);
        };
        const over = e => {
          if (e.target.closest('a,button')) {
            cur.style.width = '20px'; cur.style.height = '20px'; cur.style.opacity = '0.6';
            ring.style.width = '56px'; ring.style.height = '56px';
          } else {
            cur.style.width = '10px'; cur.style.height = '10px'; cur.style.opacity = '1';
            ring.style.width = '36px'; ring.style.height = '36px';
          }
        };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseover', over);
        return () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseover', over); };
      }, []);
    }

    // ── Progress
    function useProgress() {
      useEffect(() => {
        const bar = document.getElementById('progress');
        const update = () => {
          const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
          bar.style.width = pct + '%';
        };
        window.addEventListener('scroll', update, { passive: true });
        return () => window.removeEventListener('scroll', update);
      }, []);
    }

    // ── Reveal observer
    function useReveal() {
      useEffect(() => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); } });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    // ── Skill bar observer
    function useSkillBars() {
      useEffect(() => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.querySelectorAll('.skill-bar').forEach(bar => {
                bar.style.width = bar.dataset.w;
              });
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.3 });
        const el = document.querySelector('.skill-list');
        if (el) obs.observe(el);
        return () => obs.disconnect();
      }, []);
    }

    // ── Nav active section
    function useActiveSection() {
      const [active, setActive] = useState('home');
      useEffect(() => {
        const ids = ['home','about','work','projects','contact'];
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, { threshold: 0.45 });
        ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);
      return active;
    }

    // ── Typewriter
    function Typewriter({ words }) {
      const [text, setText] = useState('');
      const [wi, setWi] = useState(0);
      const [ci, setCi] = useState(0);
      const [del, setDel] = useState(false);
      useEffect(() => {
        const word = words[wi];
        const delay = del ? 55 : 90;
        const t = setTimeout(() => {
          if (!del) {
            setText(word.slice(0, ci + 1));
            if (ci + 1 >= word.length) { setTimeout(() => setDel(true), 1600); }
            else setCi(c => c + 1);
          } else {
            setText(word.slice(0, ci - 1));
            if (ci - 1 <= 0) { setDel(false); setCi(0); setWi(w => (w + 1) % words.length); }
            else setCi(c => c - 1);
          }
        }, del ? 55 : 90);
        return () => clearTimeout(t);
      }, [text, wi, ci, del]);
      return <span style={{color:'var(--navy-light)', fontStyle:'italic'}}>{text}</span>;
    }

    // ── Nav scrolled
    function useScrolled() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);
      return scrolled;
    }

    // ── Theme toggle
    function useTheme() {
      const [theme, setTheme] = useState(() => {
        return localStorage.getItem('kg-theme') || 'dark';
      });
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('kg-theme', theme);
      }, [theme]);
      const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
      return [theme, toggle];
    }

    const skills = [
      { label: 'Systems Design', pct: 88 },
      { label: 'Artificial Intelligence', pct: 85 },
      { label: 'Business Analytics', pct: 80 },
      { label: 'Machine Learning', pct: 78 },
      { label: 'Operations', pct: 75 },
    ];

      { num: '01', title: 'Intelligent Operations Platform', desc: 'AI systems that support process clarity and smarter day-to-day decisions.', cat: 'AI Systems' },
      { num: '02', title: 'Data-Driven Analytics Framework', desc: 'Translating raw information into structured insight for teams and leaders.', cat: 'Analytics' },
      { num: '03', title: 'Product Intelligence Suite', desc: 'Exploring how intelligent products move from concept to real-world impact.', cat: 'Product' },
      { num: '04', title: 'Operational Clarity Engine', desc: 'Bringing intelligence to workflows so complexity becomes manageable.', cat: 'Operations' },
    ];

    function App() {
      useCursor();
      useProgress();
      useReveal();
      useSkillBars();
      const active = useActiveSection();
      const scrolled = useScrolled();
      const [theme, setTheme] = React.useState(() => localStorage.getItem('kg-theme') || 'dark');
      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('kg-theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

      const nav = ['home','about','work','projects','contact'];

      return (
        <>
          {/* NAV */}
          <nav className={scrolled ? 'scrolled' : ''}>
            <a href="#home" className="nav-brand">Kasra <b>Gordini</b></a>
            <ul className="nav-links">
              {nav.map(n => (
                <li key={n}>
                  <a href={`#${n}`} className={active === n ? 'active' : ''}>
                    {n.charAt(0).toUpperCase() + n.slice(1)}
                  </a>
                </li>
              ))}
            </ul>
            <button className="theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">
              {theme === 'dark' ? '☀' : '☽'}
            </button>
          </nav>

          {/* HERO */}
          <section id="home">
            <div className="hero-photo" style={{backgroundImage: `url(${window.PORTRAIT_DATA})`}} />
            <div className="hero-overlay-left" />
            <div className="hero-overlay-bottom" />
            <div className="hero-overlay-vignette" />
            <div className="hero-photo-grade" />
            <div className="hero-content">
              <div className="hero-kicker">AI · Analytics · Systems</div>
              <h1 className="hero-name">
                Kasra<em>Gordini</em>
              </h1>
              <p className="hero-tagline">
                Building <Typewriter words={['intelligent','data-driven','practical','purposeful']} /> systems
              </p>
              <div className="hero-divider" />
              <p className="hero-desc">
                I work at the intersection of artificial intelligence, analytics, and business systems — designing practical tools that turn complexity into clarity.
              </p>
              <div className="hero-actions">
                <a href="#about" className="btn btn-primary">Explore my work</a>
                <a href="#contact" className="btn btn-outline">Get in touch</a>
              </div>
            </div>
            <div className="hero-scroll-indicator">
              <div className="scroll-line" />
              <span className="scroll-text">Scroll</span>
            </div>
          </section>

          {/* ABOUT */}
          <section id="about">
            <div className="section-inner">
              <div className="s-label reveal">About</div>
              <h2 className="s-heading reveal">How I think about<br/><em>systems & decisions.</em></h2>
              <p className="s-body reveal">My work combines structure, curiosity, and implementation. I'm interested in how data, systems, and AI can be shaped into tools that are technically sound and genuinely useful in real operating environments.</p>
              <div className="about-grid">
                <div>
                  {[
                    { num: 'i.', h: 'What I care about', p: "I'm drawn to ideas that connect intelligence with action: systems that make work clearer, decisions more grounded, and organizations more capable of doing meaningful things." },
                    { num: 'ii.', h: 'How I think', p: "I value simplicity, depth, and relevance. I prefer solutions that are elegant, understandable, and shaped around real human and business needs." },
                    { num: 'iii.', h: 'My approach', p: "I start with the problem, not the technology. Understanding what clarity looks like for a team comes before any solution takes shape." },
                  ].map((b,i) => (
                    <div className={`about-block reveal reveal-delay-${i+1}`} key={b.num}>
                      <div className="about-block-num">{b.num}</div>
                      <h3>{b.h}</h3>
                      <p>{b.p}</p>
                    </div>
                  ))}
                </div>
                <div className="about-right-visual reveal reveal-delay-2">
                  <div style={{fontFamily:'var(--serif)', fontSize:'1.15rem', marginBottom:'28px', color:'var(--text-dim)', fontStyle:'italic'}}>Areas of expertise</div>
                  <ul className="skill-list">
                    {skills.map(s => (
                      <li className="skill-item" key={s.label}>
                        <span style={{fontWeight:300, fontSize:'0.9rem'}}>{s.label}</span>
                        <div className="skill-bar-wrap">
                          <div className="skill-bar" data-w={s.pct + '%'} style={{width:'0%'}} />
                        </div>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          </section>

          {/* WORK */}
          <section id="work">
            <div className="section-inner">
              <div className="s-label reveal">Work</div>
              <h2 className="s-heading reveal">Areas of <em>focus.</em></h2>
              <p className="s-body reveal">My interests sit across connected areas where strategy, data, and system design come together in practical ways.</p>
              <div className="work-grid">
                {[
                  { n:'01', h:'Artificial Intelligence', p:'Exploring practical AI systems that support operations, reasoning, automation, and stronger day-to-day decision-making.', tag:'AI & ML' },
                  { n:'02', h:'Analytics', p:'Turning raw information into clarity through structured analysis, modeling, and a strong understanding of business context.', tag:'Data' },
                  { n:'03', h:'Product Thinking', p:'Designing tools and systems with careful attention to usefulness, adoption, and long-term value.', tag:'Strategy' },
                  { n:'04', h:'Operations', p:'Applying intelligence to real workflows so complexity becomes manageable and decisions become more grounded.', tag:'Systems' },
                ].map((w,i) => (
                  <div className={`work-item reveal reveal-delay-${(i%2)+1}`} key={w.n}>
                    <div className="work-num">{w.n}</div>
                    <h3>{w.h}</h3>
                    <p>{w.p}</p>
                    <span className="work-item-tag">{w.tag}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* PROJECTS */}
          <section id="projects">
            <div className="section-inner">
              <div className="s-label reveal">Projects</div>
              <h2 className="s-heading reveal">Selected areas <em>of work.</em></h2>
              <div className="project-table reveal">
                {projects.map(p => (
                  <div className="project-row" key={p.num}>
                    <span className="proj-num">{p.num}</span>
                    <div className="proj-info">
                      <h3>{p.title}</h3>
                      <p>{p.desc}</p>
                    </div>
                    <span className="proj-category">{p.cat}</span>
                    <div className="proj-arrow">↗</div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* CONTACT */}
          <section id="contact">
            <div className="section-inner">
              <div className="contact-grid">
                <div>
                  <div className="s-label reveal">Contact</div>
                  <h2 className="s-heading reveal">Let's <em>connect.</em></h2>
                  <p className="s-body reveal" style={{marginBottom:'24px'}}>I'm always open to thoughtful conversations — whether it's a project, a collaboration, or simply a shared interest in building something meaningful.</p>
                  <p className="reveal" style={{fontSize:'0.88rem', fontWeight:300, color:'var(--text-dimmer)'}}>Reach out through any of the channels and I'll get back to you promptly.</p>
                </div>
                <div className="contact-links reveal">
                  {[
                    { href:'mailto:kasragordini@gmail.com', icon:'✉', strong:'Email', span:'contact@kasragordini.com' },
                    { href:'https://www.linkedin.com/in/kasra-gordini/', icon:'in', strong:'LinkedIn', span:'kasra-gordini' },
                    { href:'https://github.com/kasragordini', icon:'⌥', strong:'GitHub', span:'kasragordini' },
                  ].map(c => (
                    <a href={c.href} className="contact-link" key={c.href} target={c.href.startsWith('http') ? '_blank' : undefined} rel="noopener noreferrer">
                      <div className="contact-icon">{c.icon}</div>
                      <div className="contact-info"><strong>{c.strong}</strong><span>{c.span}</span></div>
                      <span className="contact-arrow">→</span>
                    </a>
                  ))}
                </div>
              </div>
            </div>
          </section>

          <footer>
            © 2026 <span>Kasra Gordini</span> — Built with care &amp; intention.
          </footer>
        </>
      );
    }

    // Set initial theme before render
    const savedTheme = localStorage.getItem('kg-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Blink keyframe inject
    const st = document.createElement('style');
    st.textContent = '@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }';
    document.head.appendChild(st);
  </script>
</body>
</html>
